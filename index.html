<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/Fav-iocn-sp.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suraj-Portfolio</title>
  <style>
    .text-wrapper {
      position: relative;
      display: inline-block;
      font-size: 2em;
    }
    .logo-outline {
      color: transparent;
      -webkit-text-stroke: 1px #ffffff;
      display: inline-block;
    }
    .logo-wave {
      color: #ffffff;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: inline-block;
      animation: wave 4s ease-in-out infinite;
    }
    @keyframes wave {
      0%, 100% { clip-path: polygon(0% 45%, 15% 44%, 32% 50%, 54% 60%, 70% 61%, 84% 59%, 100% 52%, 100% 100%, 0% 100%); }
      50% { clip-path: polygon(0% 60%, 16% 65%, 34% 66%, 51% 62%, 67% 50%, 84% 45%, 100% 46%, 100% 100%, 0% 100%); }
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
